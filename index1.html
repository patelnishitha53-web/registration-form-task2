<body>
    <!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
}
form{
    width:400px;
    padding:20px;
    border:1px solid black;
}
input{
    margin:5px 0;
}
</style>
</head>
<body>

<h2>Registration Form</h2>

<form>

<label>Name:</label><br>
<input type="text" placeholder="Enter Name" required><br><br>

<label>Password:</label><br>
<input type="password" placeholder="Enter Password" required><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Enter Email" required><br><br>

<label>Phone:</label><br>
<input type="tel" placeholder="Enter Phone Number" required><br><br>

<label>Website:</label><br>
<input type="url" placeholder="Enter Website URL"><br><br>

<label>Date of Birth:</label><br>
<input type="date" required><br><br>

<label>Date & Time:</label><br>
<input type="datetime-local"><br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<br><br>

<label>Skills:</label><br>
<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> JavaScript
<br><br>

<label>Upload Resume:</label><br>
<input type="file"><br><br>

<label>Experience:</label><br>
<input type="range" min="0" max="10"><br><br>

<label>Favorite Color:</label><br>
<input type="color"><br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
</body>
</html>
